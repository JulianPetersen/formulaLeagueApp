

  <!-- CARD CARRERA -->
  <ion-card class="race-card">
    <ion-card-content>
       
      <div class="race-info">
        <h1>{{race?.name}}</h1>
        <p class="circuit">{{race?.circuit.name}}</p>
      </div>

      <div class="race-meta">
        <div>
          <span>📅</span>
           <p>{{ race?.date | date:'dd MMM · HH:mm' }}</p>
        </div>
        <div>
          <span>⏱️</span>
          <p>Cierra en {{ remainingTime }}</p>
        </div>
      </div>

        <div class="predict-cta">
    <ion-icon name="flash-outline"></ion-icon>
    <span>Click para pronosticar</span>
  </div>

    </ion-card-content>
  </ion-card>
