<div class="credits-banner" (click)="goToGetCredits()">
  <div class="credits-icon">
    <span>⚡</span>
  </div>

  <div class="credits-copy">
    <span class="credits-label">Creditos disponibles</span>
    <strong>{{ userData?.credits || 0 }}</strong>
  </div>

  <ion-button
    size="small"
    fill="clear"
    (click)="goToGetCredits(); $event.stopPropagation()">
    Ganar mas
  </ion-button>
</div>
