<ion-card class="pilots-card">
  <ion-card-content>

    <h3>Tu pronóstico</h3>
    <p class="hint">Arrastrá para ordenar del 1° al 10°</p>

    <ion-reorder-group [disabled]="predictionAlreadyExists && !isEditingPrediction"
      (ionItemReorder)="doReorder($event)">

      <ion-item *ngFor="let pilot of listPilots; let i = index" class="pilot-item">

        <ion-label>
          <strong>#{{ i + 1 }}</strong> {{ pilot.name }}
        </ion-label>
        <ion-avatar>
          <img [src]="pilot.img" [alt]="pilot.name" />
        </ion-avatar>
        <ion-reorder slot="end"></ion-reorder>

      </ion-item>

    </ion-reorder-group>


    @if(predictionAlreadyExists){
    <div class="prediction-saved">
      ✅ Pronóstico enviado
    </div>
    }


    <div *ngIf="predictionAlreadyExists && !isEditingPrediction" class="modify-section">

      <p>
        ⚡ Tienes {{ userCredits }} créditos
      </p>

      <ion-button expand="block" color="warning" (click)="enableEdit()">

        Modificar pronóstico · 10 créditos
      </ion-button>
    </div>


    <div *ngIf="isEditingPrediction" class="editing-warning">

      ⚠️ Guardar cambios costará 10 créditos

    </div>
  </ion-card-content>

</ion-card>

<!-- CTA -->
<ion-button *ngIf="!predictionAlreadyExists" expand="block" shape="round" class="submit-btn" (click)="enviarData()">

  Guardar pronóstico
</ion-button>

<ion-button *ngIf="isEditingPrediction" expand="block" shape="round" color="danger" (click)="saveChanges()">

  Guardar cambios (-10 créditos)
</ion-button>
