<ion-content class="account-content">

  <!-- HEADER -->
  <div class="account-header">
    <div class="avatar">
      {{ user?.username.charAt(0) || 'U' }}
    </div>

    <h2>{{ user?.name }}</h2>
    <p class="email">{{ user?.email }}</p>
  </div>

  <!-- PUNTOS -->
  <ion-card class="points-card">
    <ion-card-content>
      <p class="label">Puntos acumulados</p>
      <h1 class="points">{{ user?.points }}</h1>
    </ion-card-content>
  </ion-card>




  <!-- ACTIONS -->
   <div class="actions">
      <ion-button
    expand="block"
    shape="round"
    color="primary"
    class="logout-btn"
    (click)="logout()">
    Cerrar sesión
  </ion-button>
   </div>


</ion-content>
