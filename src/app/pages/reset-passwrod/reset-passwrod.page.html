<ion-content class="login-content">
  <div class="login-wrapper">

    <!-- LOGO -->
    <div class="logo">
      <img src="/assets/logo.png" alt="Logo de app">
    </div>

    <!-- CARD -->
    <ion-card class="login-card">
      <ion-card-content>

        <form [formGroup]="form" (ngSubmit)="submit()">

          <ion-item lines="none">
            <ion-input
              type="email"
              label="Email"
              labelPlacement="floating"
              formControlName="email">
            </ion-input>
          </ion-item>

          <ion-button
            expand="block"
            shape="round"
            class="login-btn"
            type="submit"
            [disabled]="form.invalid || loading">
            Recuperar contraseña
          </ion-button>

         

          @if (loading) {
            <div class="loader">
              <ion-spinner name="crescent"></ion-spinner>
            </div>
          }

        </form>
        <p>{{this.error}}</p>
      </ion-card-content>
    </ion-card>


  </div>
</ion-content>
